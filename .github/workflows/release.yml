name: Release

on:
  push:
    tags:
      - 'v*'
  # Reusable: release-please calls this in its own (user-triggered) run so the
  # GITHUB_TOKEN recursion guard never strands a release without artifacts.
  workflow_call:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    env:
      # Only mint an App token when the App private key is configured, so
      # private dogfood builds (no external publishers) still pass.
      HAS_APP: ${{ secrets.APP_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # PAT-free cross-repo writes (Homebrew tap / Scoop bucket): a short-lived
      # GitHub App installation token, scoped to just the publisher repos.
      - name: Mint GitHub App token
        id: app-token
        if: env.HAS_APP == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            adeptability
            homebrew-tap
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # Docker login only when DOCKER_PUBLISH is opted-in via repo variable.
      - name: Login to GHCR
        if: vars.DOCKER_PUBLISH == '1'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Run goreleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          DOCKER_PUBLISH: ${{ vars.DOCKER_PUBLISH }}
          COSIGN_EXPERIMENTAL: 'true'
      # SLSA provenance needs base64(sha256  name) lines — goreleaser's
      # checksums.txt is exactly that. Locate it from the artifacts manifest.
      - name: Generate subject hashes
        id: hash
        env:
          ARTIFACTS: ${{ steps.goreleaser.outputs.artifacts }}
        run: |
          set -euo pipefail
          checksum_file=$(echo "$ARTIFACTS" | jq -r '.[] | select(.type=="Checksum") | .path')
          echo "hashes=$(base64 -w0 < "$checksum_file")" >> "$GITHUB_OUTPUT"

  provenance:
    needs: goreleaser
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
