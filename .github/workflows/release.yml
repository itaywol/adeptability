name: Release

on:
  push:
    tags:
      - 'v*'
  # Reusable: release-please calls this in its own (user-triggered) run so the
  # GITHUB_TOKEN recursion guard never strands a release without artifacts.
  workflow_call:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      # Only mint an App token when the App private key is configured, so
      # private dogfood builds (no external publishers) still pass.
      HAS_APP: ${{ secrets.APP_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # PAT-free cross-repo writes (Homebrew tap / Scoop bucket): a short-lived
      # GitHub App installation token, scoped to just the publisher repos.
      - name: Mint GitHub App token
        id: app-token
        if: env.HAS_APP == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            adeptability
            homebrew-tap
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # Docker login only when DOCKER_PUBLISH is opted-in via repo variable.
      - name: Login to GHCR
        if: vars.DOCKER_PUBLISH == '1'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Run goreleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          DOCKER_PUBLISH: ${{ vars.DOCKER_PUBLISH }}
          COSIGN_EXPERIMENTAL: 'true'
      # Build provenance via GitHub's native attestation API (not a release
      # asset), so it works with immutable releases. goreleaser's checksums.txt
      # (sha256<space><space>name) attests every artifact in one shot. Locate it
      # from the artifacts manifest in case the filename is ever customized.
      - name: Resolve checksum file
        id: cksum
        env:
          ARTIFACTS: ${{ steps.goreleaser.outputs.artifacts }}
        run: |
          set -euo pipefail
          echo "path=$(echo "$ARTIFACTS" | jq -r '.[] | select(.type=="Checksum") | .path')" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: ${{ steps.cksum.outputs.path }}
