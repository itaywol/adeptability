id: junie-test
name: Junie (test)
kind: per-skill
output: .junie/guidelines/{id}.md
base-dir: .junie
needs-directory: false
frontmatter:
  include:
    - description
    - tags
  rename:
    description: desc
body:
  prefix: "> Auto-generated by adeptability. Do not edit by hand.\n\n"
  suffix: "\n<!-- end -->"
  replace:
    - regex: "PROJECT"
      with:   "demo"
detect:
  - .junie
