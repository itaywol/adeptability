run:
  timeout: 5m
  go: '1.25'

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - misspell
    - revive
    - bodyclose
    - errorlint
    - nilerr
    - prealloc
    - unconvert

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
  exclude-dirs:
    - vendor
    - dist
