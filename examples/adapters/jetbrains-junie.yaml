# Example config-driven adapter for a hypothetical JetBrains Junie harness.
# Drop into ~/.adeptability/adapters/ and adept loads it at startup.

id: jetbrains-junie
name: JetBrains Junie
kind: per-skill
output: ".junie/guidelines/{id}.md"
needs-directory: false
size-budget-bytes: 0

frontmatter:
  include:
    - description
    - tags
  rename:
    description: summary

body:
  prefix: |
    > Auto-generated by adeptability. Do not edit by hand.

  suffix: ""
  replace:
    - regex: '\{\{PROJECT\}\}'
      with:   "{{.Project.Name}}"

detect:
  - ".junie/"
  - ".junie/guidelines/"

# Optional reverse-rendering hints. The default `adept harness import` flow
# auto-derives the inverse rename from `frontmatter.rename` above, so this
# block is only needed when the forward rename is non-bijective (e.g. two
# canonical keys both projected to the same harness key) or when the harness
# writes additional aliases we want to canonicalize on import.
#
# Keys here are harness-side frontmatter keys; values are canonical skill
# fields (`description`, `globs`, `tags`, ...).
#
# import:
#   rename:
#     headline: description

